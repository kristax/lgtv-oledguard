<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Presence Detector</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#000;--bg-panel:#060606;--bg-card:#080808;--bg-input:#0c0c0c;
  --border:#1c1c1c;--border-hi:#2a2a2a;
  --text:#c8c8c8;--text-dim:#555;--text-hi:#e8e8e8;
  --accent:#4ecca3;--glow:rgba(78,204,163,0.25);
  --warn:#f39c12;--danger:#e94560;--blue:#3498db;
  --font:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}

/* === OLED scanline grain === */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
  opacity:0.5;
}

body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  display:flex;min-height:100vh;font-size:12px;font-weight:400;
  letter-spacing:0.02em;-webkit-font-smoothing:antialiased;
}

/* === SIDEBAR — narrow control strip === */
nav{
  width:210px;background:var(--bg-panel);display:flex;flex-direction:column;
  height:100vh;flex-shrink:0;overflow:hidden;border-right:1px solid var(--border);
  padding:20px 16px;
}
nav .nav-top{flex:0 0 auto}
nav .nav-mid{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding-bottom:12px}
nav .nav-bot{flex:0 0 auto;border-top:1px solid var(--border);padding-top:14px}

/* Language */
nav .lang-bar{display:flex;gap:1px;margin-bottom:18px}
nav .lang-bar button{
  flex:1;padding:5px 0;border:1px solid var(--border);background:transparent;
  color:var(--text-dim);cursor:pointer;font-size:10px;font-family:var(--font);
  letter-spacing:0.06em;transition:all 0.2s;
}
nav .lang-bar button.active{background:var(--accent);color:#000;border-color:var(--accent);box-shadow:0 0 12px var(--glow)}

/* Action buttons */
nav button.action{
  width:100%;padding:9px 0;margin:4px 0;border:1px solid var(--border);cursor:pointer;
  font-size:11px;font-family:var(--font);font-weight:500;
  letter-spacing:0.04em;transition:all 0.2s;background:transparent;color:var(--text);
}
nav button.action:hover{border-color:var(--text-dim)}
.btn-save{background:var(--accent)!important;color:#000!important;border-color:var(--accent)!important}
.btn-save:hover{box-shadow:0 0 20px var(--glow)}
.btn-off{color:var(--warn)!important;border-color:var(--warn)!important}
.btn-off:hover{background:var(--warn)!important;color:#000!important}
.btn-auto{color:var(--blue)!important;border-color:var(--blue)!important}
.btn-auto:hover{background:var(--blue)!important;color:#000!important}
.btn-auto.off{color:var(--text-dim)!important;border-color:var(--border)!important}
.btn-debug{color:var(--danger)!important;border-color:var(--danger)!important}
.btn-debug:hover{background:var(--danger)!important;color:#fff!important}
.btn-debug.off{color:var(--text-dim)!important;border-color:var(--border)!important}

/* Status indicators in sidebar */
nav .st{padding:0}
nav .st .si{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:10px;color:var(--text-dim);letter-spacing:0.03em}
nav .st .si b{color:var(--text);font-weight:500}
nav .st .si.on b{color:var(--accent)}
nav .st .si.warn b{color:var(--warn)}
nav .st .si .st-dot{width:5px;height:5px;background:var(--border-hi);flex-shrink:0;margin-left:6px}
nav .st .si.on .st-dot{background:var(--accent);box-shadow:0 0 6px var(--glow)}
nav .st .si.warn .st-dot{background:var(--warn)}

/* === MAIN AREA === */
main{
  flex:1;display:flex;align-items:stretch;background:var(--bg);
  background-image:
    linear-gradient(rgba(255,255,255,0.012) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.012) 1px,transparent 1px);
  background-size:24px 24px;
  padding:24px;overflow-y:auto;
}

/* Card grid */
main .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;align-content:start}
@media(max-width:900px){main .grid{grid-template-columns:1fr}}

.card{
  background:var(--bg-card);border:1px solid var(--border);
  padding:18px 20px;transition:border-color 0.2s;
}
.card:hover{border-color:var(--border-hi)}
.card h2{
  font-size:10px;color:var(--text-dim);text-transform:uppercase;
  letter-spacing:0.12em;font-weight:500;margin-bottom:14px;
  padding-bottom:8px;border-bottom:1px solid var(--border);
}
.card label{display:block;font-size:11px;color:var(--text);margin:10px 0 3px}
.card label .desc{display:block;font-size:9px;color:var(--text-dim);font-weight:400;margin-top:1px;line-height:1.5}
.card .val{font-size:11px;color:var(--accent);margin-left:6px;font-weight:500}
.card .row{display:flex;gap:12px}
.card .row>div{flex:1}

/* Inputs in cards */
.card input[type=range]{
  width:100%;margin-top:3px;-webkit-appearance:none;appearance:none;
  background:transparent;height:18px;cursor:pointer;
}
.card input[type=range]::-webkit-slider-runnable-track{height:1px;background:var(--border-hi)}
.card input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:8px;height:8px;background:var(--accent);margin-top:-4px;
  box-shadow:0 0 8px var(--glow);transition:box-shadow 0.2s;
}
.card input[type=range]::-webkit-slider-thumb:hover{box-shadow:0 0 16px var(--glow)}
.card input[type=number],.card input[type=text]{
  width:100%;padding:6px 8px;background:var(--bg-input);border:1px solid var(--border);
  color:var(--text-hi);font-size:11px;font-family:var(--font);letter-spacing:0.03em;
  transition:border-color 0.15s,box-shadow 0.15s;
}
.card input[type=number]:focus,.card input[type=text]:focus{
  outline:none;border-color:var(--accent);box-shadow:0 0 0 1px var(--glow);
}

/* Checkboxes */
.card input[type=checkbox]{
  appearance:none;-webkit-appearance:none;
  width:11px;height:11px;background:var(--bg-input);border:1px solid var(--border);
  cursor:pointer;position:relative;flex-shrink:0;
  transition:border-color 0.15s,background 0.15s,box-shadow 0.15s;
}
.card input[type=checkbox]:checked{background:var(--accent);border-color:var(--accent);box-shadow:0 0 6px var(--glow)}
.card input[type=checkbox]:checked::after{
  content:'';position:absolute;left:3px;top:1px;
  width:3px;height:6px;border:solid #000;border-width:0 1.5px 1.5px 0;
  transform:rotate(45deg);
}

/* Hotkey card specifics */
.hk-enable{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.hk-enable span{font-size:11px;color:var(--text)}
.hk-mods{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0}
.hk-mods label{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text);margin:0;cursor:pointer;font-weight:400}
.hk-key-input{cursor:pointer;text-align:center}

/* === DEBUG STREAM OVERLAY === */
.debug-stream{
  display:none;position:relative;width:100%;align-items:center;justify-content:center;
}
body.debug main{display:flex;gap:16px;align-items:stretch}
body.debug .debug-stream{display:flex;flex:1;min-width:0}
body.debug .grid{display:block;width:280px;flex-shrink:0;align-self:stretch}
body.debug .grid .card{height:100%}
body.debug .card:nth-child(1),
body.debug .card:nth-child(3),
body.debug .card:nth-child(4){display:none}
.debug-stream img{max-width:100%;max-height:calc(100vh - 48px);border:1px solid var(--border)}
.debug-stream .close-btn{
  position:absolute;top:0;right:0;
  width:26px;height:26px;background:rgba(0,0,0,0.9);border:1px solid var(--border);
  color:var(--text);font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font);transition:border-color 0.2s,color 0.2s;
}
.debug-stream .close-btn:hover{border-color:var(--danger);color:var(--danger)}

/* === ANIMATIONS === */
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card:nth-child(1){animation:cardIn 0.35s ease backwards;animation-delay:0.05s}
.card:nth-child(2){animation:cardIn 0.35s ease backwards;animation-delay:0.1s}
.card:nth-child(3){animation:cardIn 0.35s ease backwards;animation-delay:0.15s}
.card:nth-child(4){animation:cardIn 0.35s ease backwards;animation-delay:0.2s}
</style>
</head>
<body>
<nav>
  <div class="nav-top">
    <div class="lang-bar">
      <button class="active" onclick="setLang('zh')">中文</button>
      <button onclick="setLang('en')">EN</button>
    </div>
  </div>

  <div class="nav-mid">
    <button class="action btn-save" onclick="saveConfig()" data-t="btn_save"></button>
    <button class="action btn-off" onclick="screenOff()" data-t="btn_screen_off"></button>
    <button class="action btn-auto" id="btn_auto" onclick="toggleAutoStart()"></button>
    <button class="action btn-debug off" id="btn_debug" onclick="toggleDebug()"></button>
  </div>

  <div class="nav-bot">
    <div class="st">
      <div class="si" id="st_face"></div>
      <div class="si" id="st_eyes"></div>
      <div class="si" id="st_state"></div>
      <div class="si" id="st_idle"></div>
      <div class="si" id="st_hotkey"></div>
    </div>
  </div>
</nav>

<main>
  <!-- Card grid (hidden when debug active) -->
  <div class="grid">
    <!-- Camera card -->
    <div class="card">
      <h2 data-t="sec_camera"></h2>
      <label><span data-t="lbl_device_id"></span> <span class="val" id="v_device_id">0</span><span class="desc" data-t="desc_device_id"></span></label>
      <input type="number" id="device_id" value="0" min="0" max="5">
      <div class="row">
        <div><label><span data-t="lbl_width"></span> <span class="val" id="v_width">1280</span></label><input type="range" id="width" value="1280" min="320" max="1920" step="80"></div>
        <div><label><span data-t="lbl_height"></span> <span class="val" id="v_height">720</span></label><input type="range" id="height" value="720" min="240" max="1080" step="60"></div>
      </div>
    </div>

    <!-- Detection card -->
    <div class="card">
      <h2 data-t="sec_detection"></h2>
      <label><span data-t="lbl_model_size"></span> <span class="val" id="v_model_size">640</span><span class="desc" data-t="desc_model_size"></span></label>
      <input type="range" id="model_size" value="640" min="320" max="1280" step="160">
      <label><span data-t="lbl_score_threshold"></span> <span class="val" id="v_score_threshold">0.5</span></label>
      <input type="range" id="score_threshold" value="0.5" min="0.1" max="0.9" step="0.05">
      <label><span data-t="lbl_nms_threshold"></span> <span class="val" id="v_nms_threshold">0.3</span></label>
      <input type="range" id="nms_threshold" value="0.3" min="0.1" max="0.9" step="0.05">
      <label><span data-t="lbl_min_eye_dist"></span> <span class="val" id="v_min_eye_dist">15</span></label>
      <input type="range" id="min_eye_dist" value="15" min="5" max="50" step="1">
      <label><span data-t="lbl_min_face_size"></span> <span class="val" id="v_min_face_size">30</span></label>
      <input type="range" id="min_face_size" value="30" min="10" max="100" step="5">
    </div>

    <!-- Timing card -->
    <div class="card">
      <h2 data-t="sec_timing"></h2>
      <div class="row">
        <div><label><span data-t="lbl_active_timeout"></span> <span class="val" id="v_active_timeout_sec">120</span></label><input type="range" id="active_timeout_sec" value="120" min="30" max="600" step="10"></div>
        <div><label><span data-t="lbl_passive_interval"></span> <span class="val" id="v_passive_interval_sec">2</span></label><input type="range" id="passive_interval_sec" value="2" min="1" max="10" step="1"></div>
      </div>
      <div class="row">
        <div><label><span data-t="lbl_no_face_cycles"></span> <span class="val" id="v_no_face_cycles">5</span></label><input type="range" id="no_face_cycles" value="5" min="2" max="30" step="1"></div>
        <div><label><span data-t="lbl_no_eyes_cycles"></span> <span class="val" id="v_no_eyes_cycles">15</span></label><input type="range" id="no_eyes_cycles" value="15" min="5" max="60" step="1"></div>
      </div>
    </div>

    <!-- System card -->
    <div class="card">
      <h2 data-t="sec_system"></h2>
      <label><span data-t="lbl_server_port"></span><span class="desc" data-t="desc_server_port"></span></label>
      <input type="number" id="server_port" value="19999" min="1024" max="65535">
      <label><span data-t="lbl_lgtv_cmd"></span><span class="desc" data-t="desc_lgtv_cmd"></span></label>
      <input type="text" id="lg_tv_cmd" value="LGTVcli.exe">
      <label style="margin-top:14px"><span data-t="lbl_hotkey"></span><span class="desc" data-t="desc_hotkey"></span></label>
      <div class="hk-enable">
        <input type="checkbox" id="hotkey_enabled" onchange="onHotkeyCfgChange()">
        <span data-t="lbl_hotkey_enabled"></span>
      </div>
      <label style="margin-top:6px"><span data-t="lbl_hotkey_mods"></span></label>
      <div class="hk-mods">
        <label><input type="checkbox" id="hk_ctrl" onchange="onHotkeyCfgChange()"> Ctrl</label>
        <label><input type="checkbox" id="hk_alt" onchange="onHotkeyCfgChange()"> Alt</label>
        <label><input type="checkbox" id="hk_shift" onchange="onHotkeyCfgChange()"> Shift</label>
        <label><input type="checkbox" id="hk_win" onchange="onHotkeyCfgChange()"> Win</label>
      </div>
      <label style="margin-top:6px"><span data-t="lbl_hotkey_key"></span></label>
      <input type="text" id="hotkey_key" readonly placeholder="Click and press a key" class="hk-key-input">
    </div>
  </div>

  <!-- Debug stream (shown when debug active) -->
  <div class="debug-stream" id="debug_stream_wrap">
    <img id="stream" src="" alt="">
    <button class="close-btn" id="close_btn" onclick="stopDebug()">&times;</button>
  </div>
</main>

<script>
// === i18n ===
const T={
zh:{
sec_camera:"摄像头",sec_detection:"检测参数",sec_timing:"时间策略",sec_system:"系统",
lbl_device_id:"设备 ID",desc_device_id:"要使用的摄像头索引，0 表示第一个摄像头",
lbl_width:"采集宽度",desc_width:"摄像头采集分辨率宽度（像素）。越高越清晰，但 CPU 负载越大",
lbl_height:"采集高度",desc_height:"摄像头采集分辨率高度（像素）",
lbl_model_size:"模型尺寸",desc_model_size:"YuNet DNN 内部推理尺寸。320=快速, 640=平衡, 1280=最高精度但更慢",
lbl_score_threshold:"置信度阈值",desc_score_threshold:"人脸检测的最低置信度。越低越容易检测到人脸（但可能误检），越高越严格",
lbl_nms_threshold:"NMS 阈值",desc_nms_threshold:"非极大值抑制阈值。控制重叠人脸框的合并程度，越高保留越多框",
lbl_min_eye_dist:"最小眼距",desc_min_eye_dist:"判定\"眼睛可见\"的最小双眼关键点距离（像素）。低于此值判定为未看向屏幕",
lbl_min_face_size:"最小人脸尺寸",desc_min_face_size:"忽略小于此尺寸（像素）的人脸检测结果，用于过滤背景噪声",
lbl_active_timeout:"活跃超时(s)",desc_active_timeout:"无鼠标键盘操作多少秒后启动摄像头检测。正常使用电脑时摄像头休眠，省 CPU",
lbl_passive_interval:"被动检测间隔(s)",desc_passive_interval:"摄像头模式下每次检测的间隔秒数。越小越灵敏，但 CPU 占用更高",
lbl_no_face_cycles:"无人脸周期数",desc_no_face_cycles:"连续多少次检测不到人脸后判定为\"已离开\"，触发关屏。×间隔 = 实际秒数",
lbl_no_eyes_cycles:"无眼睛周期数",desc_no_eyes_cycles:"连续多少次检测到人脸但无眼睛后判定为\"未看屏幕\"（如看手机），触发关屏",
lbl_server_port:"HTTP 端口",desc_server_port:"Web 管理界面的监听端口。修改后需重启程序生效",
lbl_lgtv_cmd:"LGTV 命令",desc_lgtv_cmd:"控制显示器的命令行工具路径。程序通过它来开关屏幕",
lbl_hotkey:"快捷键",desc_hotkey:"全局快捷键，快速关闭屏幕。息屏后 2 秒内不会响应键鼠唤醒",
lbl_hotkey_enabled:"启用快捷键",lbl_hotkey_mods:"修饰键",lbl_hotkey_key:"按键",
btn_save:"保存配置",btn_screen_off:"立即关闭屏幕",
btn_auto_on:"自启: ON",btn_auto_off:"自启: OFF",
btn_debug_start:"调试预览",btn_debug_stop:"停止调试",
st_face:"人脸",st_eyes:"眼睛",st_state:"状态",st_idle:"空闲",
active:"活跃 (摄像头休眠)",passive:"被动检测中",screen_off:"屏幕已关闭",
lang_zh:"中文",lang_en:"EN"
},
en:{
sec_camera:"Camera",sec_detection:"Detection",sec_timing:"Timing",sec_system:"System",
lbl_device_id:"Device ID",desc_device_id:"Camera device index, 0 for first camera",
lbl_width:"Width",desc_width:"Capture resolution width (px). Higher = clearer but more CPU",
lbl_height:"Height",desc_height:"Capture resolution height (px)",
lbl_model_size:"Model Size",desc_model_size:"YuNet DNN internal size. 320=fast, 640=balanced, 1280=max accuracy",
lbl_score_threshold:"Confidence",desc_score_threshold:"Minimum confidence for face detection. Lower = more detections",
lbl_nms_threshold:"NMS Threshold",desc_nms_threshold:"Non-maximum suppression threshold. Higher keeps more overlapping boxes",
lbl_min_eye_dist:"Eye Dist",desc_min_eye_dist:"Minimum eye landmark distance (px) to consider eyes visible",
lbl_min_face_size:"Min Face",desc_min_face_size:"Ignore face detections smaller than this (px)",
lbl_active_timeout:"Timeout (s)",desc_active_timeout:"Idle seconds before camera activates. Camera sleeps during normal use",
lbl_passive_interval:"Interval (s)",desc_passive_interval:"Detection interval in camera mode. Lower = more responsive",
lbl_no_face_cycles:"No-Face Cycles",desc_no_face_cycles:"Consecutive no-face detections to confirm absence",
lbl_no_eyes_cycles:"No-Eyes Cycles",desc_no_eyes_cycles:"Consecutive face-but-no-eyes to confirm not watching",
lbl_server_port:"HTTP Port",desc_server_port:"Web management interface port. Requires restart to apply",
lbl_lgtv_cmd:"LGTV Command",desc_lgtv_cmd:"Display control CLI tool path. Used to turn screen on/off",
lbl_hotkey:"Hotkey",desc_hotkey:"Global shortcut to turn off screen. 2s wake guard after off",
lbl_hotkey_enabled:"Enable Hotkey",lbl_hotkey_mods:"Modifiers",lbl_hotkey_key:"Key",
btn_save:"Save Config",btn_screen_off:"Turn Off Screen",
btn_auto_on:"Auto-Start: ON",btn_auto_off:"Auto-Start: OFF",
btn_debug_start:"Debug",btn_debug_stop:"Stop Debug",
st_face:"Face",st_eyes:"Eyes",st_state:"State",st_idle:"Idle",
active:"Active",passive:"Passive",screen_off:"Screen OFF",
lang_zh:"中文",lang_en:"EN"
}};

let lang=localStorage.getItem('lang')||'zh';
function t(k){return T[lang][k]||k}
function setLang(l){
lang=l;localStorage.setItem('lang',l);
document.documentElement.lang=l;
document.querySelectorAll('[data-t]').forEach(el=>{el.textContent=t(el.dataset.t)});
document.querySelectorAll('.lang-bar button').forEach(b=>b.classList.remove('active'));
event.target.classList.add('active');
updateDebugUI(debugActive);
updateAutoBtn(autoOn);
}
function applyLang(){
document.querySelectorAll('[data-t]').forEach(el=>{el.textContent=t(el.dataset.t)});
document.querySelectorAll('.lang-bar button').forEach(b=>{
b.classList.toggle('active',(b.textContent.trim()===t('lang_zh')&&lang==='zh')||(b.textContent.trim()===t('lang_en')&&lang==='en'));
});
}

// === Config ===
var debugActive=false,autoOn=false;

async function load(){
const r=await fetch('/api/config');const c=await r.json();
const cam=c.camera||{};
document.getElementById('device_id').value=cam.device_id||0;updateVal('device_id',cam.device_id||0);
document.getElementById('width').value=cam.width||1280;updateVal('width',cam.width||1280);
document.getElementById('height').value=cam.height||720;updateVal('height',cam.height||720);
const det=c.detection||{};
document.getElementById('model_size').value=det.model_size||640;updateVal('model_size',det.model_size||640);
document.getElementById('score_threshold').value=det.score_threshold||0.5;updateVal('score_threshold',det.score_threshold||0.5);
document.getElementById('nms_threshold').value=det.nms_threshold||0.3;updateVal('nms_threshold',det.nms_threshold||0.3);
document.getElementById('min_eye_dist').value=det.min_eye_dist||15;updateVal('min_eye_dist',det.min_eye_dist||15);
document.getElementById('min_face_size').value=det.min_face_size||30;updateVal('min_face_size',det.min_face_size||30);
const tim=c.timing||{};
document.getElementById('active_timeout_sec').value=tim.active_timeout_sec||120;updateVal('active_timeout_sec',tim.active_timeout_sec||120);
document.getElementById('passive_interval_sec').value=tim.passive_interval_sec||2;updateVal('passive_interval_sec',tim.passive_interval_sec||2);
document.getElementById('no_face_cycles').value=tim.no_face_cycles||5;updateVal('no_face_cycles',tim.no_face_cycles||5);
document.getElementById('no_eyes_cycles').value=tim.no_eyes_cycles||15;updateVal('no_eyes_cycles',tim.no_eyes_cycles||15);
const sys=c.system||{};
document.getElementById('server_port').value=sys.server_port||19999;
document.getElementById('lg_tv_cmd').value=sys.lg_tv_cmd||'LGTVcli.exe';
document.getElementById('hotkey_enabled').checked=sys.hotkey_enabled!==false;
document.getElementById('hk_ctrl').checked=!!(sys.hotkey_modifiers&2);
document.getElementById('hk_alt').checked=!!(sys.hotkey_modifiers&1);
document.getElementById('hk_shift').checked=!!(sys.hotkey_modifiers&4);
document.getElementById('hk_win').checked=!!(sys.hotkey_modifiers&8);
document.getElementById('hotkey_key').value=vkName(sys.hotkey_key_code||0x4C);
updateAutoBtn(sys.auto_start||false);
try{const ds=await fetch('/debug/status');const dj=await ds.json();if(!dj.active)updateDebugUI(false)}catch(e){updateDebugUI(false)}
applyLang();
}
['device_id','width','height','model_size','score_threshold','nms_threshold','min_eye_dist','min_face_size','active_timeout_sec','passive_interval_sec','no_face_cycles','no_eyes_cycles'].forEach(id=>{const el=document.getElementById(id);if(el)el.oninput=()=>updateVal(id,el.value)});
function updateVal(id,val){const v=document.getElementById('v_'+id);if(v)v.textContent=val}

function getConfig(){
return{
camera:{device_id:parseInt(document.getElementById('device_id').value)||0,width:parseInt(document.getElementById('width').value)||1280,height:parseInt(document.getElementById('height').value)||720},
detection:{model_size:parseInt(document.getElementById('model_size').value)||640,score_threshold:parseFloat(document.getElementById('score_threshold').value)||0.5,nms_threshold:parseFloat(document.getElementById('nms_threshold').value)||0.3,min_eye_dist:parseFloat(document.getElementById('min_eye_dist').value)||15,min_face_size:parseInt(document.getElementById('min_face_size').value)||30},
timing:{active_timeout_sec:parseInt(document.getElementById('active_timeout_sec').value)||120,passive_interval_sec:parseInt(document.getElementById('passive_interval_sec').value)||2,no_face_cycles:parseInt(document.getElementById('no_face_cycles').value)||5,no_eyes_cycles:parseInt(document.getElementById('no_eyes_cycles').value)||15,camera_warmup_frames:5},
system:{auto_start:autoOn,server_port:parseInt(document.getElementById('server_port').value)||19999,lg_tv_cmd:document.getElementById('lg_tv_cmd').value||'LGTVcli.exe',hotkey_enabled:document.getElementById('hotkey_enabled').checked,hotkey_modifiers:hotkeyModifiers(),hotkey_key_code:currentVK()}
};
}
async function saveConfig(){await fetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(getConfig())});alert(t('btn_save')+' OK')}

function updateDebugUI(active){
debugActive=active;
const b=document.getElementById('btn_debug'),c=document.getElementById('close_btn');
b.textContent=active?t('btn_debug_stop'):t('btn_debug_start');
b.className='action btn-debug'+(active?'':' off');
if(active){document.body.classList.add('debug')}else{document.body.classList.remove('debug');document.getElementById('stream').src=''}
}
function toggleDebug(){debugActive?stopDebug():startDebug()}
async function startDebug(){document.getElementById('stream').src='/debug/stream';updateDebugUI(true)}
async function stopDebug(){await fetch('/debug/stop',{method:'POST'});updateDebugUI(false)}
async function screenOff(){await fetch('/api/screen/off',{method:'POST'})}

async function toggleAutoStart(){
const r=await fetch('/api/autostart',{method:'POST'});const j=await r.json();updateAutoBtn(j.enabled)
}
function updateAutoBtn(on){
autoOn=on;
const b=document.getElementById('btn_auto');b.textContent=on?t('btn_auto_on'):t('btn_auto_off');b.className='action btn-auto'+(on?'':' off')
}

// === Hotkey helpers ===
var _hotkeyVK=0x4C;
function vkName(vk){
if(vk>=0x41&&vk<=0x5A)return String.fromCharCode(vk);
if(vk>=0x30&&vk<=0x39)return String.fromCharCode(vk);
if(vk>=0x70&&vk<=0x7B)return 'F'+(vk-0x6F);
var m={0x20:'Space',0x0D:'Enter',0x1B:'Esc',0x09:'Tab',0x2E:'Delete',0x08:'Backspace',0x21:'PageUp',0x22:'PageDown',0x23:'End',0x24:'Home',0x25:'Left',0x26:'Up',0x27:'Right',0x28:'Down',0x2D:'Insert',0x6A:'Num*',0x6B:'Num+',0x6D:'Num-',0x6E:'Num.',0x6F:'Num/',0x90:'NumLock',0x91:'Scroll',0x13:'Pause',0x2C:'PrintScreen',0x5B:'LWin',0x5C:'RWin',0xA0:'LShift',0xA1:'RShift',0xA2:'LCtrl',0xA3:'RCtrl',0xA4:'LAlt',0xA5:'RAlt',0xBC:',',0xBE:'.',0xBF:'/',0xBA:';',0xDB:'[',0xDD:']',0xDC:'\\',0xDE:"'",0xC0:'`',0xBD:'-',0xBB:'='};
return m[vk]||('VK_0x'+vk.toString(16).toUpperCase());
}
function currentVK(){return _hotkeyVK}
function hotkeyModifiers(){
var m=0;
if(document.getElementById('hk_alt').checked)m|=1;
if(document.getElementById('hk_ctrl').checked)m|=2;
if(document.getElementById('hk_shift').checked)m|=4;
if(document.getElementById('hk_win').checked)m|=8;
return m;
}

document.getElementById('hotkey_key').addEventListener('keydown',function(e){
e.preventDefault();e.stopPropagation();
_hotkeyVK=e.keyCode;
this.value=vkName(e.keyCode);
});
document.getElementById('hotkey_key').addEventListener('click',function(){this.select()});
function onHotkeyCfgChange(){}

// === Status poll ===
setInterval(async()=>{
try{const r=await fetch('/api/status');const s=await r.json();
updateSt('st_face',t('st_face'),s.face==='true',s.face==='true'?'YES':'no');
updateSt('st_eyes',t('st_eyes'),s.eyes==='true',s.eyes==='true'?'YES':'no');
updateSt('st_state',t('st_state'),false,t(s.state));
updateSt('st_idle',t('st_idle'),false,(s.idle_sec||0)+'s');
const hk=document.getElementById('st_hotkey');
if(hk){const hv=s.hotkey||'';const ok=hv==='ok';hk.innerHTML='Hotkey<span class="st-dot"></span>';hk.className='si'+(ok?' on':(hv&&hv!=='disabled'?' warn':''));hk.title=ok?'OK':hv}
}catch(e){}
},2000);

function updateSt(id,label,on,val){
const el=document.getElementById(id);if(!el)return;
el.innerHTML=label+'<b>'+val+'</b><span class="st-dot"></span>';
el.className='si'+(on?' on':'');
}
load();
</script>
